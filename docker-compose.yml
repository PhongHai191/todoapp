version: "3.8"

services:
  db:
    image: postgres:15
    container_name: db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    image: 529646246979.dkr.ecr.ap-southeast-2.amazonaws.com/todo-backend:${TAG}
    container_name: backend
    restart: always
    environment:
      DB_USER: ${DB_USER}
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: ${DB_PORT}
      PORT: ${PORT}
    depends_on:
      - db

  nginx:
    image: 529646246979.dkr.ecr.ap-southeast-2.amazonaws.com/todo-nginx:${TAG}
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
