name: Deploy TodoApp (Develop)

on:
  push:
    branches: [ "develop" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ec2-user
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd /home/ec2-user/todoapp

          git fetch origin
          git reset --hard origin/develop

          # =========================
          # BACKEND
          # =========================
          cd backend
          npm install
          pm2 restart backend || pm2 start index.js --name backend
          cd ..

          # =========================
          # FRONTEND
          # =========================
          cd frontend
          sudo cp index.html /var/www/todoapp/
          cd ..

          # =========================
          # NGINX
          # =========================
          sudo cp nginx.cf /etc/nginx/conf.d/todoapp.conf
          sudo nginx -t
          sudo systemctl reload nginx
