name: CI/CD Pipeline

on:
  push:
    branches: ["develop_docker"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Validate structure
        run: |
          set -e
          test -d backend || (echo "backend missing" && exit 1)
          test -d frontend || (echo "frontend missing" && exit 1)
          test -f docker-compose.yml || (echo "docker-compose.yml missing" && exit 1)
          test -f database/init.sql || (echo "init.sql missing" && exit 1)

      - name: Install backend deps
        run: |
          cd backend
          npm ci

      - name: Code quality
        run: |
          cd backend
          npm run lint
          npm run format:check
      - name: Build backend image
        run: docker build -t test-backend ./backend
      - name: Build nginx image
        run: docker build -t test-nginx -f nginx/Dockerfile .

  cd:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push backend
        run: |
          IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/todo-backend
          docker build -t $IMAGE:${{ github.sha }} ./backend
          docker push $IMAGE:${{ github.sha }}

      - name: Build & Push nginx
        run: |
          IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/todo-nginx
          docker build -t $IMAGE:${{ github.sha }} -f nginx/Dockerfile .
          docker push $IMAGE:${{ github.sha }}
      - name: Backup current deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP2 }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /home/ec2-user

            if [ -d "todoapp" ]; then
              BACKUP_DIR="todoapp_backup_$(date +%Y%m%d_%H%M%S)"
              cp -r todoapp $BACKUP_DIR

              echo "Backup: $BACKUP_DIR"

              echo $BACKUP_DIR > /tmp/latest_backup
            fi

      - name: Copy compose & init.sql
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP2 }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml,database/init.sql"
          target: /home/ec2-user/todoapp

      - name: Deploy EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP2 }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /home/ec2-user/todoapp
            PREVIOUS_TAG=$(docker inspect \
            $(docker ps -q --filter "name=backend" | head -n1) \
            --format '{{.Config.Image}}' 2>/dev/null \
            | cut -d ':' -f2)

            echo "Previous tag: $PREVIOUS_TAG"
            echo $PREVIOUS_TAG > /tmp/previous_tag

            # login ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            PARAMS=(
              DB_USER
              DB_PASSWORD
              DB_HOST
              DB_NAME
              DB_PORT
              PORT
              POSTGRES_USER
              POSTGRES_PASSWORD
              POSTGRES_DB
            )

            for param in "${PARAMS[@]}"; do
              export $param=$(aws ssm get-parameter \
                --name "/todo/$param" \
                --with-decryption \
                --query "Parameter.Value" \
                --output text)
            done

            # image tag
            export TAG=${{ github.sha }}

            # deploy
            docker compose down --remove-orphans
            docker compose pull
            docker compose up -d --scale backend=3

      - name: Verify Deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP2 }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /home/ec2-user/todoapp

            PREVIOUS_TAG=$(cat /tmp/previous_tag || echo "")

            rollback () {
              echo "=== ROLLBACK START ==="
              PARAMS=(
              DB_USER DB_PASSWORD DB_HOST DB_NAME DB_PORT
              PORT POSTGRES_USER POSTGRES_PASSWORD POSTGRES_DB
              )

              for param in "${PARAMS[@]}"; do
                export $param=$(aws ssm get-parameter \
                  --name "/todo/$param" \
                  --with-decryption \
                  --query "Parameter.Value" \
                  --output text)
              done

              BACKUP_DIR=$(cat /tmp/latest_backup || echo "")
              
              if [ -z "$BACKUP_DIR" ]; then
                echo "No backup folder → cannot rollback"
                exit 1
              fi

              echo "Restore from $BACKUP_DIR"

              cd /home/ec2-user
              rm -rf todoapp
              cp -r $BACKUP_DIR todoapp

              cd /home/ec2-user/todoapp

              if [ -n "$PREVIOUS_TAG" ]; then
                export TAG=$PREVIOUS_TAG
              fi

              docker compose down
              docker compose pull
              docker compose up -d --scale backend=3

              echo "=== ROLLBACK DONE ==="
            }

            echo "=== WAIT ==="
            sleep 10

            docker ps

            docker ps | grep backend || (echo "backend fail" && rollback && exit 1)
            docker ps | grep nginx || (echo "nginx fail" && rollback && exit 1)

            check_health () {
              URL=$1

              for i in {1..10}; do
                if curl -f $URL > /dev/null; then
                  echo "Health OK"
                  return 0
                fi
                echo "retry $i..."
                sleep 5
              done

              echo "Health FAILED"
              docker compose logs --tail=50

              rollback
              exit 1
            }

            check_health "http://localhost/api/health"

            echo "=== DEPLOY SUCCESS ==="
