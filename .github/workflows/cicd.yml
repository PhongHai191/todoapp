name: Deploy to VM

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: yance
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          debug: true
          script: |
            echo "===== DEPLOY START ====="

            cd /home/yance/todoapp || exit

            git pull origin develop

            # ======================
            # BACKEND
            # ======================
            if [ -d "backend" ]; then
              cd backend

              if [ -f package.json ]; then
                npm install
              fi

              pm2 restart backend || pm2 start index.js --name backend

              cd ..
            fi

            # ======================
            # FRONTEND
            # ======================
            if [ -d "frontend" ]; then
              sudo rm -rf /var/www/todoapp/*
              sudo cp -r frontend/* /var/www/todoapp/
            fi

            # ======================
            # NGINX
            # ======================
            if [ -f "nginx.cf" ]; then
              sudo cp nginx.cf /etc/nginx/sites-enabled/default
            fi

            sudo nginx -t && sudo systemctl reload nginx

            echo "===== DEPLOY DONE ====="
